# docker-compose.yml
networks:
  todoapp-net:
services:
  pythonapp:
    image: todoapp:2.1.0
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todoapp_container
    ports:
      - "8080:8080"
    environment:
      - PYTHONUNBUFFERED=1
      - HOST=mysql
      - NAME=app_db
      - USER=app_user
      - PASSWORD=1234
      - PORT=3306
      - ENGINE=mysql.connector.django
    networks:
      - todoapp-net
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
  mysql:
    image: mysql-local:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.mysql
    container_name: my-sql
    ports:
      - "3306:3306"
    volumes:
      - todoapp-db-data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=1234
      - MYSQL_DATABASE=app_db
      - MYSQL_USER=app_user
      - MYSQL_PASSWORD=1234
    healthcheck:
     test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD"]
     interval: 5s
     timeout: 5s
     retries: 5
     start_period: 15s
    networks:
      - todoapp-net
volumes:
  todoapp-db-data:
